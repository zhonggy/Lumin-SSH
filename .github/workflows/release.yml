name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libc6-dev libayatana-appindicator3-dev \
            rpm alien

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails build -clean -tags webkit2_41 -o Lumin
          echo "binary=${{ github.workspace }}/build/bin/Lumin" >> $GITHUB_ENV

      - name: Package .deb & .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p build/deb/usr/bin
          cp build/bin/Lumin build/deb/usr/bin/lumin
          sudo chown root:root build/deb/usr/bin/lumin
          # 更新 DEBIAN/control 中的版本号
          sed -i "s/^Version:.*/Version: ${VERSION}/" build/deb/DEBIAN/control
          sudo dpkg-deb --root-owner-group --build build/deb build/lumin_${VERSION}_amd64.deb
          sha256sum build/lumin_${VERSION}_amd64.deb > build/lumin_${VERSION}_amd64.deb.sha256
          echo "deb=${{ github.workspace }}/build/lumin_${VERSION}_amd64.deb" >> $GITHUB_ENV
          echo "deb_sha=${{ github.workspace }}/build/lumin_${VERSION}_amd64.deb.sha256" >> $GITHUB_ENV
          # Convert .deb to .rpm via alien
          sudo alien -r build/lumin_${VERSION}_amd64.deb --scripts 2>/dev/null || echo "alien_rpm_failed=true" >> $GITHUB_ENV
          RPM_FILE=$(find . -name "*.rpm" 2>/dev/null | head -1)
          if [ -n "$RPM_FILE" ]; then
            mv "$RPM_FILE" build/
            RPM_BASENAME=$(basename "$RPM_FILE")
            sha256sum "build/$RPM_BASENAME" > "build/$RPM_BASENAME.sha256"
            echo "rpm=${{ github.workspace }}/build/$RPM_BASENAME" >> $GITHUB_ENV
            echo "rpm_sha=${{ github.workspace }}/build/$RPM_BASENAME.sha256" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.binary }}
            ${{ env.deb }}
            ${{ env.deb_sha }}
            ${{ env.rpm }}
            ${{ env.rpm_sha }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Wails Doctor
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails doctor

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails build -clean -o Lumin

      - name: Package .app to .dmg
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp -r build/bin/Lumin.app build/Lumin.app
          hdiutil create -volname "Lumin" -srcfolder build/Lumin.app -ov -format UDZO build/Lumin-${VERSION}.dmg
          sha256sum build/Lumin-${VERSION}.dmg > build/Lumin-${VERSION}.dmg.sha256
          echo "app_dmg=${{ github.workspace }}/build/Lumin-${VERSION}.dmg" >> $GITHUB_ENV
          echo "app_sha=${{ github.workspace }}/build/Lumin-${VERSION}.dmg.sha256" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.app_dmg }}
            ${{ env.app_sha }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails (binary + NSIS installer)
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;C:\Program Files (x86)\NSIS;" + $env:PATH
          wails build -clean -o Lumin.exe --nsis

      - name: Package portable
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace "^v", ""
          Copy-Item build/bin/Lumin.exe "build/Lumin-$VERSION-portable.exe"
          $hash = (CertUtil -hashfile "build/Lumin-$VERSION-portable.exe" SHA256)[1] -replace " ",""
          Set-Content -Path "build/Lumin-$VERSION-portable.exe.sha256" -Value "$hash  Lumin-$VERSION-portable.exe"
          echo "portable=${{ github.workspace }}\build\Lumin-$VERSION-portable.exe" >> $env:GITHUB_ENV
          echo "portable_sha=${{ github.workspace }}\build\Lumin-$VERSION-portable.exe.sha256" >> $env:GITHUB_ENV

      - name: Copy NSIS installer
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace "^v", ""
          $installer = Get-Item "build/bin/*-installer.exe"
          Copy-Item $installer.FullName "build/Lumin-$VERSION-amd64-installer.exe"
          $hash = (CertUtil -hashfile "build/Lumin-$VERSION-amd64-installer.exe" SHA256)[1] -replace " ",""
          Set-Content -Path "build/Lumin-$VERSION-amd64-installer.exe.sha256" -Value "$hash  Lumin-$VERSION-amd64-installer.exe"
          echo "installer=${{ github.workspace }}\build\Lumin-$VERSION-amd64-installer.exe" >> $env:GITHUB_ENV
          echo "installer_sha=${{ github.workspace }}\build\Lumin-$VERSION-amd64-installer.exe.sha256" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.portable }}
            ${{ env.portable_sha }}
            ${{ env.installer }}
            ${{ env.installer_sha }}
