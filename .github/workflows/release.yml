name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '24'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev \
            libc6-dev libayatana-appindicator3-dev \
            rpm alien fakeroot

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          VERSION=${GITHUB_REF_NAME#v}
          wails build -clean -tags webkit2_41 -o Lumin
          cp build/bin/Lumin "build/Lumin-V${VERSION}-linux-amd64"
          shasum -a 256 "build/Lumin-V${VERSION}-linux-amd64" | sed 's|build/||' > "build/Lumin-V${VERSION}-linux-amd64.sha256"
          echo "binary=${{ github.workspace }}/build/Lumin-V${VERSION}-linux-amd64" >> $GITHUB_ENV
          echo "binary_sha=${{ github.workspace }}/build/Lumin-V${VERSION}-linux-amd64.sha256" >> $GITHUB_ENV

      - name: Package .deb & .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p build/deb/DEBIAN
          mkdir -p build/deb/usr/bin
          mkdir -p build/deb/usr/share/applications
          mkdir -p build/deb/usr/share/icons/hicolor/256x256/apps
          # 生成 control 文件
          { \
            echo "Package: lumin"; \
            echo "Version: ${VERSION}"; \
            echo "Section: net"; \
            echo "Priority: optional"; \
            echo "Architecture: amd64"; \
            echo "Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libglib2.0-0, libc6, libayatana-appindicator3-1"; \
            echo "Maintainer: Lumin <admin@662662.xyz>"; \
            echo "Description: Lightweight SSH Client"; \
            echo " A modern, lightweight SSH client built with Wails."; \
            echo " Quickly manage and connect to your SSH servers."; \
          } > build/deb/DEBIAN/control
          cp build/bin/Lumin build/deb/usr/bin/lumin
          sudo chown root:root build/deb/usr/bin/lumin
          cp build/appicon.png build/deb/usr/share/icons/hicolor/256x256/apps/lumin.png
          cp build/linux/lumin.desktop build/deb/usr/share/applications/lumin.desktop
          sudo dpkg-deb --root-owner-group --build build/deb "build/Lumin-V${VERSION}-amd64.deb"
          shasum -a 256 "build/Lumin-V${VERSION}-amd64.deb" | sed 's|build/||' > "build/Lumin-V${VERSION}-amd64.deb.sha256"
          echo "deb=${{ github.workspace }}/build/Lumin-V${VERSION}-amd64.deb" >> $GITHUB_ENV
          echo "deb_sha=${{ github.workspace }}/build/Lumin-V${VERSION}-amd64.deb.sha256" >> $GITHUB_ENV
          # Convert .deb to .rpm via alien
          sudo alien -r "build/Lumin-V${VERSION}-amd64.deb" --scripts || echo "alien_rpm_failed=true" >> $GITHUB_ENV
          RPM_FILE=$(find . -name "*.rpm" 2>/dev/null | head -1)
          if [ -n "$RPM_FILE" ]; then
            mv "$RPM_FILE" build/
            RPM_BASENAME=$(basename "$RPM_FILE")
            # 统一命名：加入 V 前缀，x86_64 → amd64，去掉 alien release 号
            RPM_BASENAME_CLEAN=$(echo "$RPM_BASENAME" | sed "s/lumin-[0-9.]\+-\([0-9]\+\)\.x86_64\.rpm/Lumin-V${VERSION}-amd64.rpm/")
            if [ "$RPM_BASENAME" != "$RPM_BASENAME_CLEAN" ] && [ -f "build/$RPM_BASENAME" ]; then
              mv "build/$RPM_BASENAME" "build/$RPM_BASENAME_CLEAN"
              RPM_BASENAME="$RPM_BASENAME_CLEAN"
            fi
            shasum -a 256 "build/$RPM_BASENAME" | sed 's|build/||' > "build/$RPM_BASENAME.sha256"
            echo "rpm=${{ github.workspace }}/build/$RPM_BASENAME" >> $GITHUB_ENV
            echo "rpm_sha=${{ github.workspace }}/build/$RPM_BASENAME.sha256" >> $GITHUB_ENV
          fi

      - name: Get clean version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lumin SSH Client ${{ github.ref_name }}"
          body: |
            ## 功能增强
            - 拆分代理节点配置，优化代理与 TUN 模式设置
            - 节点导入导出（支持密文加密与云端同步兼容）
            - AI 助手编辑家族工具改进
            - 终端每行时间戳（环形缓冲区回收）
            - 关于页显示前端构建时间
            - AI 对话任务目录快捷打开入口
            - 数据管理弹窗 UI 优化及模态框层级修复

            ## Bug 修复
            - 多云同步恢复流程改进：按最后修改时间排序，保留缓存最近一条凭据
            - SSH 连接异常断开检测修复
            - 英文适配（i18n 缺少项补全）
            - 浅色主题动态关闭 minimumContrastRatio 提升可读性
            - 跨端 i18n 同步（延迟检测文字、通用翻译）

            ## 产物下载
            - Linux 便携版 ([Lumin-V${{ steps.version.outputs.version }}-linux-amd64](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-linux-amd64))：即下即用
            - Linux DEB 安装包 ([Lumin-V${{ steps.version.outputs.version }}-amd64.deb](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-amd64.deb))：Debian/Ubuntu 安装包
            - Linux RPM 安装包 ([Lumin-V${{ steps.version.outputs.version }}-amd64.rpm](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-amd64.rpm))：Red Hat/Fedora 安装包
            - macOS ARM 版 ([Lumin-V${{ steps.version.outputs.version }}-arm64.dmg](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-arm64.dmg))：Apple Silicon (M1/M2/M3/M4)
            - macOS Intel 版 ([Lumin-V${{ steps.version.outputs.version }}-amd64.dmg](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-amd64.dmg))：Intel 芯片
            - Windows 便携绿色版 ([Lumin-V${{ steps.version.outputs.version }}-portable.exe](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-portable.exe))：内嵌 WebView2，即下即用
            - Windows 标准安装版 ([Lumin-V${{ steps.version.outputs.version }}-amd64-installer.exe](https://github.com/wmwlwmwl/Lumin-SSH/releases/download/v${{ steps.version.outputs.version }}/Lumin-V${{ steps.version.outputs.version }}-amd64-installer.exe))：NSIS 安装包
            - 每个产物附带 .sha256 校验文件，自动更新时校验 SHA256 确保文件完整性

            ## 安装/卸载方法
            ### DEB 包（Debian/Ubuntu）
            ```bash
            # 安装
            sudo dpkg -i Lumin-V${{ steps.version.outputs.version }}-amd64.deb
            # 卸载
            sudo dpkg -r lumin
            ```

            ### RPM 包（Red Hat/Fedora）
            ```bash
            # 安装
            sudo rpm -ivh Lumin-V${{ steps.version.outputs.version }}-amd64.rpm
            # 卸载
            sudo rpm -e lumin
            ```
          files: |
            ${{ env.binary }}
            ${{ env.binary_sha }}
            ${{ env.deb }}
            ${{ env.deb_sha }}
            ${{ env.rpm }}
            ${{ env.rpm_sha }}

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-14
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails
        run: |
          export PATH=$HOME/go/bin:$PATH
          wails build -clean -o Lumin

      - name: Package .app to .dmg
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCH=${{ matrix.arch }}
          cp -r build/bin/Lumin.app build/Lumin.app
          hdiutil create -volname "Lumin" -srcfolder build/Lumin.app -ov -format UDZO "build/Lumin-V${VERSION}-${ARCH}.dmg"
          shasum -a 256 "build/Lumin-V${VERSION}-${ARCH}.dmg" | sed 's|build/||' > "build/Lumin-V${VERSION}-${ARCH}.dmg.sha256"
          echo "app_dmg=${{ github.workspace }}/build/Lumin-V${VERSION}-${ARCH}.dmg" >> $GITHUB_ENV
          echo "app_sha=${{ github.workspace }}/build/Lumin-V${VERSION}-${ARCH}.dmg.sha256" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.app_dmg }}
            ${{ env.app_sha }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Wails (binary + NSIS installer)
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;C:\Program Files (x86)\NSIS;" + $env:PATH
          wails build -clean -o Lumin.exe --nsis

      - name: Package portable
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace "^v", ""
          Copy-Item build/bin/Lumin.exe "build/Lumin-V$VERSION-portable.exe"
          $hash = (CertUtil -hashfile "build/Lumin-V$VERSION-portable.exe" SHA256)[1] -replace " ",""
          Set-Content -Path "build/Lumin-V$VERSION-portable.exe.sha256" -Value "$hash  Lumin-V$VERSION-portable.exe"
          echo "portable=${{ github.workspace }}\build\Lumin-V$VERSION-portable.exe" >> $env:GITHUB_ENV
          echo "portable_sha=${{ github.workspace }}\build\Lumin-V$VERSION-portable.exe.sha256" >> $env:GITHUB_ENV

      - name: Copy NSIS installer
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace "^v", ""
          $installer = Get-Item "build/bin/*-installer.exe"
          Copy-Item $installer.FullName "build/Lumin-V$VERSION-amd64-installer.exe"
          $hash = (CertUtil -hashfile "build/Lumin-V$VERSION-amd64-installer.exe" SHA256)[1] -replace " ",""
          Set-Content -Path "build/Lumin-V$VERSION-amd64-installer.exe.sha256" -Value "$hash  Lumin-V$VERSION-amd64-installer.exe"
          echo "installer=${{ github.workspace }}\build\Lumin-V$VERSION-amd64-installer.exe" >> $env:GITHUB_ENV
          echo "installer_sha=${{ github.workspace }}\build\Lumin-V$VERSION-amd64-installer.exe.sha256" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.portable }}
            ${{ env.portable_sha }}
            ${{ env.installer }}
            ${{ env.installer_sha }}